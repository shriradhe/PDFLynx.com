# ── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    server_name pdflynx.com www.pdflynx.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name pdflynx.com www.pdflynx.com;

    ssl_certificate     /etc/letsencrypt/live/pdflynx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pdflynx.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://server:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    # Proxy uploads
    location /uploads/ {
        proxy_pass http://server:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SEO routes
    location = /sitemap.xml {
        proxy_pass http://server:5000/sitemap.xml;
    }
    location = /robots.txt {
        proxy_pass http://server:5000/robots.txt;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
